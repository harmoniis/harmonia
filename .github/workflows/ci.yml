name: CI

on:
  push:
    branches: [main]
    tags: ['harmonia-v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: Check documentation coverage
        if: runner.os != 'Windows'
        run: bash scripts/check-doc-reference-coverage.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Build all crates (Unix)
        if: runner.os != 'Windows'
        run: cargo build --workspace --release

      - name: Build all crates (Windows — exclude macOS-only crates)
        if: runner.os == 'Windows'
        run: cargo build --workspace --release --exclude harmonia-imessage

      - name: Run all tests (Unix)
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Run all tests (Windows — exclude macOS-only crates)
        if: runner.os == 'Windows'
        run: cargo test --workspace --exclude harmonia-imessage

  build-freebsd:
    name: Build + Test (FreeBSD)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build and test in FreeBSD VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: "14.2"
          architecture: x86-64
          memory: 8G
          cpu_count: 4
          shell: bash
          sync_files: true
          run: |
            set -euo pipefail
            export IGNORE_OSVERSION=yes
            sudo pkg install -y curl bash ca_root_nss git
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0 --component rustfmt
            . "$HOME/.cargo/env"
            cargo build --workspace --release
            cargo test --workspace --release

  release:
    name: Release (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-freebsd]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
          # Windows — full agent support via interprocess named pipes
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          # FreeBSD — native VM build via cross-platform-actions
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x86_64
            freebsd_vm: true
            freebsd_version: "14.2"
            freebsd_arch: x86-64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          targets: ${{ !matrix.freebsd_vm && matrix.target || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.platform }}

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV

      - name: Build release binaries (FreeBSD VM)
        if: matrix.freebsd_vm
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: ${{ matrix.freebsd_version }}
          architecture: ${{ matrix.freebsd_arch }}
          memory: 8G
          cpu_count: 4
          shell: bash
          sync_files: true
          run: |
            set -euo pipefail
            export IGNORE_OSVERSION=yes
            sudo pkg install -y curl bash ca_root_nss
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0
            . "$HOME/.cargo/env"
            rustup component add rustfmt
            cargo build --workspace --release
            VERSION=${GITHUB_REF_NAME#harmonia-v}
            bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      - name: Build release binaries
        if: "!matrix.freebsd_vm"
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#harmonia-v}
          HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
          if [ "${{ matrix.target }}" != "$HOST_TARGET" ]; then
            cargo build --workspace --release --target ${{ matrix.target }}
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/harmonia target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/harmonia.exe target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.so target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.dylib target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.dll target/release/ 2>/dev/null || true
          else
            cargo build --workspace --release
          fi
          bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            harmonia-*-${{ matrix.platform }}.tar.gz
            harmonia-*-${{ matrix.platform }}.tar.gz.sha256
            harmonia-*-${{ matrix.platform }}.zip
            harmonia-*-${{ matrix.platform }}.zip.sha256

      - name: Upload install script
        if: matrix.platform == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/install.sh

      - name: Upload to S3 (optional)
        if: env.AWS_ACCESS_KEY_ID != '' && runner.os == 'Linux'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          VERSION=${GITHUB_REF_NAME#harmonia-v}
          TARBALL="harmonia-${VERSION}-${{ matrix.platform }}.tar.gz"
          if [ -n "$S3_BUCKET" ] && [ -f "$TARBALL" ]; then
            pip install awscli
            aws s3 cp "$TARBALL" "s3://${S3_BUCKET}/releases/${VERSION}/"
          else
            echo "S3 upload skipped (no bucket configured or tarball missing)"
          fi

  publish-crates:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Skip crates.io publish when token is unavailable
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish"

      - name: Publish all crates
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: bash scripts/publish-all.sh
