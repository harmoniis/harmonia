name: CI

on:
  push:
    tags: ['harmonia-v*']

permissions:
  contents: write

jobs:
  build:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Check documentation coverage
        if: runner.os != 'Windows'
        run: bash scripts/check-doc-reference-coverage.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Build all crates
        run: cargo build --workspace --release

      - name: Run all tests
        run: cargo test --workspace

  release:
    name: Release (${{ matrix.platform }})
    needs: build
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.best_effort || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          # FreeBSD via cross
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x86_64
            use_cross: true
          # NetBSD targets (tier 3 — nightly + build-std + NetBSD sysroot)
          - os: ubuntu-latest
            target: x86_64-unknown-netbsd
            platform: netbsd-x86_64
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: aarch64-unknown-netbsd
            platform: netbsd-aarch64
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: riscv64gc-unknown-netbsd
            platform: netbsd-riscv64
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: powerpc-unknown-netbsd
            platform: netbsd-powerpc
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: sparc64-unknown-netbsd
            platform: netbsd-sparc64
            use_netbsd_cross: true
            best_effort: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.use_netbsd_cross }}
        with:
          toolchain: "1.85.0"
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@nightly
        if: matrix.use_netbsd_cross
        with:
          components: rust-src

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-${{ matrix.platform }}-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install NetBSD cross-toolchain
        if: matrix.use_netbsd_cross
        shell: bash
        run: |
          # Extract arch from target triple
          ARCH="${{ matrix.target }}"
          ARCH="${ARCH%%-*}"
          # Map Rust arch names to NetBSD/GCC arch names
          case "$ARCH" in
            x86_64)     GCC_ARCH="x86_64"   ; NBSD_ARCH="amd64"   ;;
            aarch64)    GCC_ARCH="aarch64"   ; NBSD_ARCH="evbarm-aarch64" ;;
            riscv64gc)  GCC_ARCH="riscv64"   ; NBSD_ARCH="riscv-riscv64" ;;
            powerpc)    GCC_ARCH="powerpc"   ; NBSD_ARCH="evbppc"  ;;
            sparc64)    GCC_ARCH="sparc64"   ; NBSD_ARCH="sparc64" ;;
          esac
          # Install GCC cross-compiler for the target
          sudo apt-get update
          sudo apt-get install -y gcc-${GCC_ARCH}-linux-gnu || true
          # Download NetBSD base sets (includes headers + libs)
          NETBSD_VER="10.1"
          NETBSD_URL="https://cdn.netbsd.org/pub/NetBSD/NetBSD-${NETBSD_VER}/${NBSD_ARCH}/binary/sets"
          SYSROOT="/opt/netbsd-sysroot"
          sudo mkdir -p "$SYSROOT"
          for set in base comp; do
            echo "Downloading ${set}.tar.xz..."
            curl -fsSL "${NETBSD_URL}/${set}.tar.xz" -o "/tmp/${set}.tar.xz" || \
            curl -fsSL "${NETBSD_URL}/${set}.tgz" -o "/tmp/${set}.tgz" || true
            if [ -f "/tmp/${set}.tar.xz" ]; then
              sudo tar xf "/tmp/${set}.tar.xz" -C "$SYSROOT"
            elif [ -f "/tmp/${set}.tgz" ]; then
              sudo tar xzf "/tmp/${set}.tgz" -C "$SYSROOT"
            fi
          done
          # Create a wrapper script for the C compiler
          WRAPPER="/usr/local/bin/${ARCH}-unknown-netbsd-cc"
          cat <<WRAPPER_EOF | sudo tee "$WRAPPER" > /dev/null
          #!/bin/sh
          exec ${GCC_ARCH}-linux-gnu-gcc --sysroot=${SYSROOT} "\$@"
          WRAPPER_EOF
          sudo chmod +x "$WRAPPER"
          # Configure cargo to use the cross-linker
          mkdir -p .cargo
          TARGET_UPPER=$(echo "${{ matrix.target }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          cat >> .cargo/config.toml <<CARGO_EOF
          [target.${{ matrix.target }}]
          linker = "${WRAPPER}"
          CARGO_EOF
          echo "CC_$TARGET_UPPER=${WRAPPER}" >> $GITHUB_ENV
          echo "CFLAGS_$TARGET_UPPER=--sysroot=${SYSROOT}" >> $GITHUB_ENV

      - name: Build release binaries
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#harmonia-v}
          if [ "${{ matrix.use_netbsd_cross }}" = "true" ]; then
            cargo +nightly build --workspace --release --target ${{ matrix.target }} \
              -Z build-std=std,panic_abort
          elif [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --workspace --release --target ${{ matrix.target }}
          else
            HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
            if [ "${{ matrix.target }}" != "$HOST_TARGET" ]; then
              cargo build --workspace --release --target ${{ matrix.target }}
            else
              cargo build --workspace --release
            fi
          fi
          # Copy cross-compiled artifacts to target/release for build_release.sh
          if [ "${{ matrix.target }}" != "$(rustc -vV | grep host | awk '{print $2}')" ]; then
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/harmonia target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/harmonia.exe target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.so target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.dylib target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.dll target/release/ 2>/dev/null || true
          fi
          bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            harmonia-*-${{ matrix.platform }}.tar.gz
            harmonia-*-${{ matrix.platform }}.tar.gz.sha256

      - name: Upload install script
        if: matrix.platform == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/install.sh

      - name: Upload to S3 (optional)
        if: env.AWS_ACCESS_KEY_ID != '' && runner.os == 'Linux'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          VERSION=${GITHUB_REF_NAME#harmonia-v}
          TARBALL="harmonia-${VERSION}-${{ matrix.platform }}.tar.gz"
          if [ -n "$S3_BUCKET" ] && [ -f "$TARBALL" ]; then
            pip install awscli
            aws s3 cp "$TARBALL" "s3://${S3_BUCKET}/releases/${VERSION}/"
          else
            echo "S3 upload skipped (no bucket configured or tarball missing)"
          fi

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Publish all crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-all.sh
