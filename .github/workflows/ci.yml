name: CI

on:
  push:
    branches: [main]
    tags: ['harmonia-v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Check documentation coverage
        if: runner.os != 'Windows'
        run: bash scripts/check-doc-reference-coverage.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Build all crates
        run: cargo build --workspace --release

      - name: Run all tests
        run: cargo test --workspace

  release:
    name: Release (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          # FreeBSD via cross
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x86_64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-freebsd
            platform: freebsd-aarch64
            use_cross: true
            build_std: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          targets: ${{ !matrix.use_cross && matrix.target || '' }}

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-${{ matrix.platform }}-

      - name: Install cross
        if: matrix.use_cross
        run: |
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly
          cargo +nightly install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^harmonia-v', ''
          cargo build --workspace --release
          bash scripts/build_release.sh $version "${{ matrix.platform }}"

      - name: Build release binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#harmonia-v}
          if [ "${{ matrix.build_std }}" = "true" ]; then
            cross +nightly build --workspace --release --target ${{ matrix.target }} \
              -Z build-std=std,panic_abort
          elif [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --workspace --release --target ${{ matrix.target }}
          else
            HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
            if [ "${{ matrix.target }}" != "$HOST_TARGET" ]; then
              cargo build --workspace --release --target ${{ matrix.target }}
            else
              cargo build --workspace --release
            fi
          fi
          # Copy cross-compiled artifacts to target/release for build_release.sh
          if [ "${{ matrix.target }}" != "$(rustc -vV | grep host | awk '{print $2}')" ]; then
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/harmonia target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/harmonia.exe target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.so target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.dylib target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/*.dll target/release/ 2>/dev/null || true
          fi
          bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            harmonia-*-${{ matrix.platform }}.tar.gz
            harmonia-*-${{ matrix.platform }}.tar.gz.sha256

      - name: Upload install script
        if: matrix.platform == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/install.sh

      - name: Upload to S3 (optional)
        if: env.AWS_ACCESS_KEY_ID != '' && runner.os == 'Linux'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          VERSION=${GITHUB_REF_NAME#harmonia-v}
          TARBALL="harmonia-${VERSION}-${{ matrix.platform }}.tar.gz"
          if [ -n "$S3_BUCKET" ] && [ -f "$TARBALL" ]; then
            pip install awscli
            aws s3 cp "$TARBALL" "s3://${S3_BUCKET}/releases/${VERSION}/"
          else
            echo "S3 upload skipped (no bucket configured or tarball missing)"
          fi

  publish-crates:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Skip crates.io publish when token is unavailable
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish"

      - name: Publish all crates
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: bash scripts/publish-all.sh
