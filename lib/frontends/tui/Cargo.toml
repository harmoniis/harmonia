[package]
name = "harmonia-tui"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Terminal UI frontend for the Harmonia agent"
keywords = ["harmonia", "terminal"]
categories = ["command-line-interface"]

[lib]

[dependencies]
crossterm = "0.28"
dirs = "5"
console = "0.15"
unicode-width = "0.2"
serde_json = "1"
ctrlc = "3.4"
harmonia-config-store = { version = "0.1.9", path = "../../core/config-store" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
