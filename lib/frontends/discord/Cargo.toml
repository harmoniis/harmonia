[package]
name = "harmonia-discord"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Discord frontend for the Harmonia agent"
keywords = ["harmonia", "discord"]
categories = ["api-bindings"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-config-store = { version = "0.1.8", path = "../../core/config-store" }
harmonia-vault = { version = "0.1.8", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = { version = "2", features = ["json"] }
