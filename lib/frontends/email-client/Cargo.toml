[package]
name = "harmonia-email-client"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Email IMAP/SMTP frontend for the Harmonia agent"
keywords = ["harmonia", "email"]
categories = ["email"]

[lib]

[dependencies]
harmonia-actor-protocol = { version = "0.1.9", path = "../../core/actor-protocol" }
harmonia-config-store = { version = "0.1.9", path = "../../core/config-store" }
harmonia-vault = { version = "0.1.9", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
imap = "2.4"
native-tls = "0.2"
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "native-tls", "builder"] }
mailparse = "0.15"
