[package]
name = "harmonia-mqtt-client"
version = "0.1.8"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "MQTT messaging frontend for the Harmonia agent"
keywords = ["harmonia", "mqtt"]
categories = ["network-programming"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
rumqttc = "0.24"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["clock"] }
hex = "0.4"
harmonia-push = { version = "0.1.8", path = "../push" }
harmonia-baseband-channel-protocol = { version = "0.1.8", path = "../../core/baseband-channel-protocol" }
harmonia-vault = { version = "0.1.8", path = "../../core/vault" }
harmonia-config-store = { version = "0.1.8", path = "../../core/config-store" }
harmonia-transport-auth = { version = "0.1.8", path = "../../core/transport-auth" }
log = "0.4"
sha2 = "0.10"
ureq = "2"
rusqlite = { version = "0.37", features = ["bundled"] }
