[package]
name = "harmonia-nostr"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Nostr protocol frontend for the Harmonia agent"
keywords = ["harmonia", "nostr"]
categories = ["network-programming"]

[lib]

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../../core/config-store" }
harmonia-vault = { version = "0.1.9", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tungstenite = "0.24"
secp256k1 = { version = "0.29", features = ["global-context", "rand-std"] }
sha2 = "0.10"
hex = "0.4"
