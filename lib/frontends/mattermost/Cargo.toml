[package]
name = "harmonia-mattermost"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Mattermost bot frontend for the Harmonia agent"
keywords = ["harmonia", "mattermost"]
categories = ["api-bindings"]

[lib]

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../../core/config-store" }
harmonia-vault = { version = "0.1.9", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = { version = "2", features = ["json"] }
