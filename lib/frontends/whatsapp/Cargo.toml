[package]
name = "harmonia-whatsapp"
version = "0.1.6"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "WhatsApp bridge frontend for the Harmonia agent"
keywords = ["harmonia", "whatsapp"]
categories = ["api-bindings"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-config-store = { version = "0.1.6", path = "../../core/config-store" }
harmonia-vault = { version = "0.1.6", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = "2"
