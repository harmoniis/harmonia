[package]
name = "harmonia-telegram"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Telegram bot frontend for the Harmonia agent"
keywords = ["harmonia", "telegram"]
categories = ["api-bindings"]

[lib]

[dependencies]
harmonia-actor-protocol = { version = "0.1.9", path = "../../core/actor-protocol" }
harmonia-vault = { version = "0.1.9", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = "2"
