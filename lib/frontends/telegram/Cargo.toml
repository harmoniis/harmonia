[package]
name = "harmonia-telegram"
version = "0.2.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Telegram bot frontend for the Harmonia agent"
keywords = ["harmonia", "telegram"]
categories = ["api-bindings"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-vault = { version = "0.1.5", path = "../../core/vault" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = "2"
