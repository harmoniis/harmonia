[package]
name = "harmonia-signal"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Signal frontend bridge for the Harmonia agent (signal-cli REST/JSON-RPC)"
keywords = ["harmonia", "signal"]
categories = ["api-bindings"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-config-store = { version = "0.2.0", path = "../../core/config-store" }
harmonia-vault = { version = "0.1.5", path = "../../core/vault" }
serde_json = "1"
ureq = { version = "2", features = ["json"] }
