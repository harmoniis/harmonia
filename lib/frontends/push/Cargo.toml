[package]
name = "harmonia-push"
version = "0.2.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Generic HTTP webhook push notifications for Harmonia"
keywords = ["harmonia", "push"]
categories = ["web-programming"]

[lib]
crate-type = ["rlib"]

[dependencies]
harmonia-config-store = { version = "0.2.0", path = "../../core/config-store" }
ureq = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
