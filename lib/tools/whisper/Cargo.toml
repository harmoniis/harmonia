[package]
name = "harmonia-whisper"
version = "0.1.6"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "OpenAI Whisper speech-to-text integration for the Harmonia agent"
