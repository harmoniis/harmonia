[package]
name = "harmonia-hfetch"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Secure HTTP fetch client with signal-integrity protection — library and CLI tool for safe HTTP requests"
keywords = ["harmonia", "http", "security", "fetch"]
categories = ["command-line-utilities", "web-programming::http-client"]

[lib]
name = "harmonia_hfetch"

[[bin]]
name = "hfetch"
path = "src/main.rs"

[dependencies]
harmonia-signal-integrity = { version = "0.1.9", path = "../../core/signal-integrity" }
ureq = "2"
serde_json = "1"
clap = { version = "4", features = ["derive"] }
