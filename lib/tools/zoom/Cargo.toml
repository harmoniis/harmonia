[package]
name = "harmonia-zoom"
version = "0.1.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Zoom service tool operating via browser automation for the Harmonia agent"
keywords = ["harmonia", "zoom", "browser-automation"]
categories = ["web-programming"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-browser = { version = "2.1.0", path = "../browser", features = ["chrome"] }
harmonia-vault = { version = "0.1.9", path = "../../core/vault" }
serde_json = "1"
log = "0.4"
