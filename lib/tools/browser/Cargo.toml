[package]
name = "harmonia-browser"
version = "2.0.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Secure headless browser with 3-layer security for the Harmonia agent"
keywords = ["harmonia", "browser"]
categories = ["web-programming"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
chrome = ["headless_chrome"]

[dependencies]
harmonia-vault = { version = "0.1.3", path = "../../core/vault" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = { version = "2", features = ["json"] }
log = "0.4"

# Chrome CDP — opt-in via feature flag
headless_chrome = { version = "1", optional = true }
