[package]
name = "harmonia-elevenlabs"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "ElevenLabs text-to-speech backend for the Harmonia agent"
keywords = ["harmonia", "elevenlabs", "tts", "voice"]
categories = ["api-bindings"]

[lib]

[dependencies]
harmonia-voice-protocol = { version = "0.1.9", path = "../voice-protocol" }
harmonia-config-store = { version = "0.1.9", path = "../../../core/config-store" }
serde_json = "1"
ureq = { version = "2", features = ["json"] }
