[package]
name = "harmonia-voice-protocol"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Standardised voice provider protocol — shared types, HTTP helpers, and FFI scaffolding for all Harmonia voice backends"
keywords = ["harmonia", "voice", "protocol"]
categories = ["api-bindings"]

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../../../core/config-store" }
harmonia-vault = { version = "0.1.9", path = "../../../core/vault" }
rusqlite = { version = "0.37", features = ["bundled"] }
serde_json = "1"
ureq = "2"
