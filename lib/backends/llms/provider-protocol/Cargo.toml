[package]
name = "harmonia-provider-protocol"
version = "0.2.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Standardised LLM provider protocol — shared types, HTTP helpers, response extractors, and FFI scaffolding for all Harmonia backends"
keywords = ["harmonia", "llm", "protocol"]
categories = ["api-bindings"]

[dependencies]
harmonia-config-store = { version = "0.2.0", path = "../../../core/config-store" }
harmonia-vault = { version = "0.1.5", path = "../../../core/vault" }
rusqlite = { version = "0.31", features = ["bundled"] }
serde_json = "1"
