[package]
name = "harmonia-anthropic"
version = "0.2.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Native Anthropic backend for the Harmonia agent"
keywords = ["harmonia", "llm", "anthropic"]
categories = ["api-bindings"]

[lib]
crate-type = ["cdylib"]

[dependencies]
harmonia-config-store = { version = "0.2.0", path = "../../../core/config-store" }
harmonia-provider-protocol = { version = "0.2.0", path = "../provider-protocol" }
serde_json = "1"
