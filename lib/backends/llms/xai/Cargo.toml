[package]
name = "harmonia-xai"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Native xAI backend for the Harmonia agent"
keywords = ["harmonia", "llm", "xai"]
categories = ["api-bindings"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../../../core/config-store" }
harmonia-provider-protocol = { version = "0.1.9", path = "../provider-protocol" }
serde_json = "1"
