[package]
name = "harmonia-phoenix"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Process supervisor with automatic restart for the Harmonia agent"
keywords = ["harmonia", "supervisor"]
categories = ["command-line-utilities"]

[[bin]]
name = "phoenix"
path = "src/main.rs"

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../config-store" }
harmonia-chronicle = { version = "0.1.9", path = "../chronicle" }
ractor = "0.15"
tokio = { version = "1.44", features = ["rt-multi-thread", "macros", "process", "signal", "time", "sync", "net"] }
toml = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["server", "tokio"] }
http-body-util = "0.1"
rand = "0.8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
