[package]
name = "harmonia-gateway"
version = "0.1.3"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Hot-pluggable frontend gateway with dynamic library loading"
keywords = ["harmonia", "gateway"]
