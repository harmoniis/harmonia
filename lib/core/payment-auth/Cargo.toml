[package]
name = "harmonia-payment-auth"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Payment challenge and settlement primitives for Harmonia frontends"

[dependencies]
bdk_wallet = "1.2"
chrono = "0.4"
hex = "0.4"
harmonia-baseband-channel-protocol = { version = "0.1.9", path = "../baseband-channel-protocol" }
harmonia-config-store = { version = "0.1.9", path = "../config-store" }
harmoniis-wallet = { version = "=0.1.38", path = "../../../../../marketplace/harmoniis-wallet", default-features = false, features = ["bundled-sqlite"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1.44", features = ["rt", "time"] }
webylib = "0.1.0"
