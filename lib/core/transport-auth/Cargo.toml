[package]
name = "harmonia-transport-auth"
version = "0.1.9"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Shared transport trust and TLS helpers for Harmonia frontends"
keywords = ["harmonia", "transport", "tls"]
categories = ["network-programming", "cryptography"]

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../config-store" }
harmonia-vault = { version = "0.1.9", path = "../vault" }
hex = "0.4"
rustls = "0.22"
rustls-pemfile = "2"
rustls-pki-types = "1"
serde_json = "1"
sha2 = "0.10"
x509-parser = "0.18"
