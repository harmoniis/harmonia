[package]
name = "harmonia-signalograd"
version = "0.1.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Tiny attractor-guided adaptive kernel for Harmonia"
keywords = ["harmonia", "signalograd", "adaptive"]
categories = ["science", "concurrency"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-config-store = { version = "0.1.9", path = "../config-store" }
harmonia-actor-protocol = { version = "0.1.9", path = "../actor-protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
