[package]
name = "harmonia-parallel-agents"
version = "0.1.8"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Multi-agent parallel execution with tmux orchestration"
keywords = ["harmonia", "parallel"]
categories = ["concurrency"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
harmonia-config-store = { version = "0.1.8", path = "../config-store" }
harmonia-vault = { version = "0.1.8", path = "../vault" }
harmonia-provider-protocol = { version = "0.1.8", path = "../../backends/llms/provider-protocol" }
harmonia-actor-protocol = { version = "0.1.8", path = "../actor-protocol" }
serde_json = "1"
